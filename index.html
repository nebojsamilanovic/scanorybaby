<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCANORY | Premium Audio Vault</title>
    
    <style>
        /* =========================================
           SCANORY | BRAND COLOR LAWS & VARIABLES
           ========================================= */
        :root {
            --scanory-bg: #12100E;
            --scanory-section: #1E1A17;
            --scanory-primary: #C68A47;
            --scanory-secondary: #A0682B;
            --scanory-text-main: #F4F0EA;
            --scanory-text-sub: #D3CFC9;
            --glass-bg: rgba(30, 26, 23, 0.5);
            --glass-hover: rgba(30, 26, 23, 0.95);
            --glass-border: rgba(198, 138, 71, 0.15);
        }

        /* NOTE FOR CEO: Import local fonts here for absolute offline independence */
        @font-face {
            font-family: 'Raleway';
            src: local('Raleway'), sans-serif;
        }
        @font-face {
            font-family: 'Inter';
            src: local('Inter'), sans-serif;
        }

        /* =========================================
           RESET & CORE ARCHITECTURE
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--scanory-bg);
            color: var(--scanory-text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        canvas#stardust {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        main {
            z-index: 10;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 450px;
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            position: relative;
        }

        /* =========================================
           UI ELEMENTS & STYLING
           ========================================= */
        .vault-header {
            flex: none;
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .vault-header h2 {
            font-family: 'Raleway', sans-serif;
            color: var(--scanory-primary);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
        }

        /* Visual Center (Cover Art) */
        .cover-wrapper {
            flex: none;
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .cover-container {
            position: relative;
            width: 14rem;
            height: 14rem;
        }

        .cover-shadow {
            position: absolute;
            inset: -10px;
            background: inherit;
            filter: blur(25px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 50%;
            transition: opacity 0.5s ease;
        }

        .cover-wrapper.is-playing .cover-shadow {
            opacity: 0.8;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 0.5rem;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 10;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            opacity: 0.9;
            transition: transform 0.7s ease;
        }

        /* Track Meta Data */
        .track-meta {
            flex: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .track-title {
            font-family: 'Raleway', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
            text-align: center;
            font-weight: 600;
        }

        .track-artist {
            color: var(--scanory-text-sub);
            font-size: 0.75rem;
            font-weight: 300;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.8;
        }

        /* =========================================
           PROGRESS BAR (MATHEMATICALLY ALIGNED)
           ========================================= */
        .progress-container {
            flex: none;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .time-display {
            font-size: 0.65rem;
            color: var(--scanory-text-sub);
            font-family: monospace;
            opacity: 0.7;
            width: 2.5rem;
        }

        .time-display.right { text-align: right; }
        .time-display.left { text-align: left; }

        .slider-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            height: 16px;
        }

        .track-bg {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 2px;
            background: rgba(211, 207, 201, 0.2);
            border-radius: 1px;
            z-index: 1;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 2px;
            background: var(--scanory-primary);
            border-radius: 1px;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(198, 138, 71, 0.5);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            position: relative;
            z-index: 3;
            margin: 0;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--scanory-primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(198, 138, 71, 0.8);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: -5px;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.4);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: transparent;
            border: none;
        }

        input[type=range]::-moz-range-thumb {
            height: 12px;
            width: 12px;
            border: none;
            border-radius: 50%;
            background: var(--scanory-primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(198, 138, 71, 0.8);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input[type=range]::-moz-range-thumb:active {
            transform: scale(1.4);
        }

        input[type=range]::-moz-range-track {
            width: 100%;
            height: 2px;
            background: transparent;
            border: none;
        }

        /* =========================================
           CONTROLS BUTTONS
           ========================================= */
        .controls-container {
            flex: none;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            margin-bottom: 2rem;
        }

        button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--scanory-text-sub);
        }

        button:focus { outline: none; }
        
        .btn-secondary:hover { color: var(--scanory-text-main); }
        .btn-secondary.active { color: var(--scanory-primary); }

        .btn-play {
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 50%;
            background: var(--scanory-section);
            color: var(--scanory-primary);
            border: 1px solid rgba(198, 138, 71, 0.3);
            box-shadow: 0 0 20px rgba(198, 138, 71, 0.1);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-play::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(198,138,71,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-play:hover {
            transform: scale(1.05);
            border-color: var(--scanory-primary);
            box-shadow: 0 0 30px rgba(198, 138, 71, 0.3);
        }

        .btn-play:hover::before { opacity: 1; }

        /* Autoplay Blocked Animation */
        @keyframes subtle-pulse {
            0% { box-shadow: 0 0 10px rgba(198, 138, 71, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(198, 138, 71, 0.6); transform: scale(1.05); }
            100% { box-shadow: 0 0 10px rgba(198, 138, 71, 0.2); transform: scale(1); }
        }

        .btn-play.needs-interaction {
            animation: subtle-pulse 2.5s infinite ease-in-out;
            border-color: var(--scanory-primary);
        }

        /* =========================================
           PLAYLIST & COLLECTION AREA
           ========================================= */
        .collection-header {
            flex: none;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 0.5rem;
            margin-bottom: 0.75rem;
        }

        .collection-title {
            font-family: 'Raleway', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--scanory-secondary);
            text-transform: uppercase;
        }

        .playlist-wrapper {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            position: relative;
            -ms-overflow-style: none; 
            scrollbar-width: none;
            scroll-behavior: smooth;
            padding-bottom: 2rem;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        .playlist-wrapper::-webkit-scrollbar { display: none; }

        .playlist {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .playlist-item {
            background: rgba(30, 26, 23, 0.3);
            border: 1px solid transparent;
            border-radius: 0.75rem;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .playlist-item:hover, .playlist-item.active {
            background: var(--glass-hover);
            border-color: rgba(198, 138, 71, 0.3);
            transform: translateX(4px);
        }

        .item-cover {
            position: relative;
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 0.5rem;
            overflow: hidden;
            flex: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .item-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: transform 0.5s ease;
        }

        .playlist-item:hover .item-cover img {
            transform: scale(1.1);
            opacity: 1;
        }

        .playlist-item.active .item-cover img { opacity: 0.4; }

        .item-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .item-title {
            font-family: 'Raleway', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--scanory-text-main);
            transition: color 0.3s ease;
        }

        .playlist-item.active .item-title { color: var(--scanory-primary); }

        .item-artist {
            font-size: 0.65rem;
            font-weight: 300;
            color: var(--scanory-text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.8;
        }

        /* Equalizer Animation */
        .eq-bars {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            background: rgba(0,0,0,0.3);
        }

        .eq-bar {
            width: 3px;
            background: var(--scanory-primary);
            border-radius: 1px;
            animation: eq-pulse 1s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) { height: 12px; animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { height: 18px; animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { height: 10px; animation-delay: 0.5s; }

        /* Animations */
        @keyframes eq-pulse {
            0% { transform: scaleY(0.5); }
            100% { transform: scaleY(1); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-spin-slow {
            animation: spin-slow 20s linear infinite;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="stardust"></canvas>

    <main>
        <div class="vault-header">
            <h2>Scanory Vault</h2>
        </div>

        <div class="cover-wrapper" id="coverWrapper">
            <div class="cover-container">
                <div class="cover-shadow" id="coverBlur"></div>
                <div class="glass-panel">
                    <img src="BabyImage.jpeg" alt="Cover" class="cover-image" id="coverImage" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMxRTFBMTciLz48L3N2Zz4='">
                </div>
            </div>
        </div>

        <div class="track-meta">
            <h1 id="trackTitle" class="track-title">Loading...</h1>
            <p id="trackArtist" class="track-artist">SCANORY</p>
        </div>

        <audio id="audioPlayer" preload="auto"></audio>

        <div class="progress-container">
            <span id="currentTime" class="time-display right">0:00</span>
            <div class="slider-wrapper">
                <div class="track-bg"></div>
                <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                <input type="range" id="progressBar" min="0" max="100" value="0">
            </div>
            <span id="durationTime" class="time-display left">0:00</span>
        </div>

        <div class="controls-container">
            <button id="shuffleBtn" class="btn-secondary" style="width: 24px; height: 24px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
                </svg>
            </button>

            <button id="prevBtn" class="btn-secondary" style="width: 32px; height: 32px; color: var(--scanory-text-main);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="19 20 9 12 19 4 19 20"/>
                    <line x1="5" y1="19" x2="5" y2="5"/>
                </svg>
            </button>

            <button id="playBtn" class="btn-play">
                <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" style="width: 28px; height: 28px; margin-left: 3px;">
                    <polygon points="6 3 20 12 6 21 6 3"/>
                </svg>
                <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24" fill="currentColor" style="width: 28px; height: 28px;">
                    <rect x="6" y="4" width="4" height="16"/>
                    <rect x="14" y="4" width="4" height="16"/>
                </svg>
            </button>

            <button id="nextBtn" class="btn-secondary" style="width: 32px; height: 32px; color: var(--scanory-text-main);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 4 15 12 5 20 5 4"/>
                    <line x1="19" y1="5" x2="19" y2="19"/>
                </svg>
            </button>

            <button id="repeatBtn" class="btn-secondary" style="width: 24px; height: 24px; position: relative;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 2l4 4-4 4"/>
                    <path d="M3 11v-1a4 4 0 0 1 4-4h14"/>
                    <path d="M7 22l-4-4 4-4"/>
                    <path d="M21 13v1a4 4 0 0 1-4 4H3"/>
                </svg>
                <div id="repeatOneDot" class="hidden" style="position: absolute; top: 0; right: -4px; width: 6px; height: 6px; background: var(--scanory-primary); border-radius: 50%;"></div>
            </button>
        </div>

        <div class="collection-header">
            <h3 class="collection-title">Collection</h3>
        </div>

        <div class="playlist-wrapper">
            <ul id="playlistContainer" class="playlist">
                </ul>
        </div>
        
    </main>

    <script>
        // --- DATA ARCHITECTURE ---
        const playlist = [
            { id: 0, title: "Sleeping Star", artist: "Your Personal Lullaby", src: "MoonCradle.mp3", cover: "BabyImage.jpeg" },
            { id: 1, title: "Cotton Dreams", artist: "Ambient Nightscape", src: "lullaby2.mp3", cover: "BabyImage.jpeg" },
            { id: 2, title: "Moon Valley", artist: "Classical Piano", src: "lullaby3.mp3", cover: "BabyImage.jpeg" },
            { id: 3, title: "Galactic Voyage", artist: "Celestial Music Box", src: "lullaby4.mp3", cover: "BabyImage.jpeg" },
            { id: 4, title: "First Smile", artist: "Family Heritage", src: "lullaby5.mp3", cover: "BabyImage.jpeg" }
        ];

        // --- DOM ELEMENTS ---
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const repeatOneDot = document.getElementById('repeatOneDot');
        
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const coverImage = document.getElementById('coverImage');
        const coverWrapper = document.getElementById('coverWrapper');
        const coverBlur = document.getElementById('coverBlur');
        const playlistContainer = document.getElementById('playlistContainer');

        // --- STATE ---
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0: None, 1: All, 2: One

        // --- PLAYER MECHANICS ---
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.src;
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            coverImage.src = track.cover;
            
            coverBlur.style.backgroundImage = `url(${track.cover})`;
            coverBlur.style.backgroundSize = 'cover';
            
            renderPlaylist();
            scrollToActiveTrack();
        }

        function togglePlayPause() {
            // Remove the attention pulse if the user interacted
            playBtn.classList.remove('needs-interaction');
            isPlaying ? audio.pause() : audio.play();
        }

        function updatePlayState(playing) {
            isPlaying = playing;
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                coverImage.classList.add('animate-spin-slow');
                coverWrapper.classList.add('is-playing');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                coverImage.classList.remove('animate-spin-slow');
                coverWrapper.classList.remove('is-playing');
            }
        }

        function playNext() {
            if (isShuffle) {
                let nextIndex = currentTrackIndex;
                while (nextIndex === currentTrackIndex && playlist.length > 1) {
                    nextIndex = Math.floor(Math.random() * playlist.length);
                }
                currentTrackIndex = nextIndex;
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            }
            loadTrack(currentTrackIndex);
            
            // Interaction removes the pulse class
            playBtn.classList.remove('needs-interaction');
            
            // Force play on track change
            audio.play();
        }

        function playPrev() {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            
            // Interaction removes the pulse class
            playBtn.classList.remove('needs-interaction');
            
            // Force play on track change
            audio.play();
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            isShuffle ? shuffleBtn.classList.add('active') : shuffleBtn.classList.remove('active');
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            if (repeatMode === 0) {
                repeatBtn.classList.remove('active');
                repeatOneDot.classList.add('hidden');
            } else if (repeatMode === 1) {
                repeatBtn.classList.add('active');
                repeatOneDot.classList.add('hidden');
            } else {
                repeatBtn.classList.add('active');
                repeatOneDot.classList.remove('hidden');
            }
        }

        function scrollToActiveTrack() {
            const activeItem = document.getElementById(`track-${currentTrackIndex}`);
            if (activeItem) {
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((track, index) => {
                const isActive = index === currentTrackIndex;
                const li = document.createElement('li');
                li.id = `track-${index}`;
                li.className = `playlist-item ${isActive ? 'active' : ''}`;
                li.onclick = () => {
                    currentTrackIndex = index;
                    loadTrack(currentTrackIndex);
                    playBtn.classList.remove('needs-interaction');
                    audio.play();
                };

                li.innerHTML = `
                    <div class="item-cover">
                        <img src="${track.cover}">
                        ${isActive ? `
                        <div class="eq-bars">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>` : ''}
                    </div>
                    <div class="item-info">
                        <span class="item-title">${track.title}</span>
                        <span class="item-artist">${track.artist}</span>
                    </div>
                    ${isActive ? `<div style="width: 6px; height: 6px; border-radius: 50%; background: var(--scanory-primary); box-shadow: 0 0 5px var(--scanory-primary); flex: none;"></div>` : ''}
                `;
                playlistContainer.appendChild(li);
            });
        }

        // --- EVENT LISTENERS ---
        playBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);
        shuffleBtn.addEventListener('click', toggleShuffle);
        repeatBtn.addEventListener('click', toggleRepeat);

        audio.addEventListener('play', () => updatePlayState(true));
        audio.addEventListener('pause', () => updatePlayState(false));
        
        audio.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else if (repeatMode === 1 || currentTrackIndex < playlist.length - 1) {
                playNext();
            } else {
                updatePlayState(false);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                progressFill.style.width = `${progressPercent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        progressBar.addEventListener('input', (e) => {
            const seekTime = (e.target.value / 100) * audio.duration;
            audio.currentTime = seekTime;
            progressFill.style.width = `${e.target.value}%`;
        });

        // --- STARDUST DUST MECHANICS ---
        const canvas = document.getElementById('stardust');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * -0.4 - 0.1;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5 + 0.1; 
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(198, 138, 71, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animateStardust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateStardust);
        }
        animateStardust();

        // --- INITIALIZATION & AUTOPLAY STRATEGY ---
        loadTrack(currentTrackIndex);

        // Attempt Elite Autoplay Promise
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(() => {
                // Autoplay was allowed by the device
                updatePlayState(true);
            }).catch(error => {
                // Autoplay was blocked (Standard iOS/Android behavior)
                // Trigger the subtle invitation pulse on the play button
                console.log("SCANORY Vault: Awaiting user interaction to unlock audio.");
                playBtn.classList.add('needs-interaction');
            });
        }
    </script>
</body>
</html>

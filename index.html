<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCANORY | Baby Ambiance Mixer</title>
    
    <style>
        /* =========================================
           SCANORY | BRAND COLOR LAWS & VARIABLES
           ========================================= */
        :root {
            --scanory-bg: #0C0A09;
            --scanory-section: #141210;
            --scanory-primary: #C68A47;
            --scanory-primary-glow: rgba(198, 138, 71, 0.15);
            --scanory-secondary: #A0682B;
            --scanory-text-main: #F4F0EA;
            --scanory-text-sub: #78726C;
            --glass-bg: rgba(20, 18, 16, 0.5);
            --transition-smooth: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @font-face { font-family: 'Raleway'; src: local('Raleway'), sans-serif; }
        @font-face { font-family: 'Inter'; src: local('Inter'), sans-serif; }

        /* =========================================
           RESET & CORE FULLSCREEN ARCHITECTURE
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--scanory-bg);
            color: var(--scanory-text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100dvh; /* Rešava problem sa dynamic toolbar preklapanjem na telefonima */
            width: 100vw;
            max-width: 100%;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overscroll-behavior: none; 
        }

        canvas#stardust {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.5;
        }

        main {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center; /* Drži sve elemente strogo na sredini */
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom, 1.5rem); /* Sigurna zona od donje ivice telefona */
        }

        .spacer-top { flex: 1.2; } 
        .spacer-bottom { flex: 0.8; } 

        /* =========================================
           HEADER
           ========================================= */
        .vault-header {
            flex: none;
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .vault-header h2 {
            font-family: 'Raleway', sans-serif;
            color: var(--scanory-primary);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            font-weight: 500;
            opacity: 0.4;
            text-indent: 0.6em; /* Sprečava vizuelno pomeranje naslova ulevo */
        }

        /* =========================================
           THE INVISIBLE SOUND EMITTER (Centralni Krug)
           ========================================= */
        .brand-center {
            flex: none;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem auto;
            position: relative;
            overflow: hidden; /* Seče bilo kakvu sliku ili sjaj koji bi gurali interfejs u stranu */
        }

        .eclipse-node {
            position: relative;
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--scanory-primary-glow);
            filter: blur(40px);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            max-width: 100%;
        }

        .eclipse-core {
            width: 90px;
            height: 90px;
            background: var(--scanory-bg); 
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .eclipse-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(198, 138, 71, 0.12);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transform: scale(0.65);
        }

        .is-playing .w1 { animation: luxury-ripple 4.5s infinite linear; will-change: transform, opacity; }
        .is-playing .w2 { animation: luxury-ripple 4.5s infinite linear; animation-delay: 1.5s; will-change: transform, opacity; }
        .is-playing .w3 { animation: luxury-ripple 4.5s infinite linear; animation-delay: 3s; will-change: transform, opacity; }

        @keyframes luxury-ripple {
            0% { transform: scale(0.65); opacity: 0; border-color: rgba(198, 138, 71, 0.25); }
            25% { opacity: 0.4; }
            100% { transform: scale(1.5); opacity: 0; border-color: rgba(198, 138, 71, 0); filter: blur(2px); }
        }

        /* =========================================
           MIXER SOUNDBOARD INTERFACE (Kanali pesmica)
           ========================================= */
        .mixer-container {
            flex: none;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .mixer-channel {
            background: rgba(20, 18, 16, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 0.85rem 1.2rem; 
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: var(--transition-smooth);
        }

        .mixer-channel.active {
            border-color: rgba(198, 138, 71, 0.1);
            background: rgba(22, 19, 17, 0.85);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .channel-icon {
            font-size: 1.25rem;
            width: 1.8rem;
            text-align: center;
            opacity: 0.25;
            filter: grayscale(100%);
            transition: var(--transition-smooth);
            flex: none;
        }

        .mixer-channel.active .channel-icon {
            opacity: 0.85;
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .channel-info {
            width: 5.5rem; /* Malo prošireno zbog dužine naziva pesmica */
            flex: none;
        }

        .channel-name {
            font-family: 'Raleway', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--scanory-text-sub);
            transition: var(--transition-smooth);
        }

        .mixer-channel.active .channel-name {
            color: var(--scanory-primary);
        }

        .slider-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            height: 20px;
        }

        .track-bg {
            position: absolute;
            left: 0; right: 0; top: 50%;
            transform: translateY(-50%);
            height: 3px; background: rgba(255, 255, 255, 0.03);
            border-radius: 3px; z-index: 1;
        }

        .progress-fill {
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            height: 3px; background: rgba(255,255,255,0.15);
            border-radius: 3px; z-index: 2;
            pointer-events: none;
            transition: background 0.4s ease, width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .mixer-channel.active .progress-fill {
            background: linear-gradient(90deg, var(--scanory-secondary), var(--scanory-primary));
        }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
            position: relative; z-index: 3; margin: 0; outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #3A3530; cursor: pointer; border: 1px solid rgba(0,0,0,0.4);
            transition: all 0.2s ease; margin-top: -5px;
        }

        .mixer-channel.active input[type=range]::-webkit-slider-thumb {
            background: var(--scanory-text-main);
            border-color: var(--scanory-primary);
            box-shadow: 0 0 8px rgba(198, 138, 71, 0.4);
        }

        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 3px; background: transparent; border: none; }

        /* =========================================
           LUXURY CONTROLS PANEL
           ========================================= */
        .controls-panel {
            flex: none;
            width: calc(100% - 3rem);
            max-width: 356px;
            margin: 1.5rem auto 0 auto;
            background: rgba(20, 18, 16, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0.5rem;
            border-radius: 32px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            z-index: 20;
        }

        .btn-master-play {
            background: rgba(255, 255, 255, 0.02);
            color: var(--scanory-text-main);
            border: 1px solid rgba(255,255,255,0.04);
            font-family: 'Raleway', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 1rem 1.8rem;
            border-radius: 24px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-grow: 1;
            text-indent: 0.2em;
        }

        .btn-master-play:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(198, 138, 71, 0.2);
        }

        .btn-master-play.active {
            background: linear-gradient(135deg, var(--scanory-secondary), var(--scanory-primary));
            color: #12100E;
            border-color: transparent;
            box-shadow: 0 10px 25px rgba(198, 138, 71, 0.25);
            font-weight: 700;
        }

        .btn-shuffle {
            background: rgba(255, 255, 255, 0.02);
            color: var(--scanory-text-sub);
            border: 1px solid rgba(255, 255, 255, 0.04);
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 24px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-shuffle:hover {
            background: rgba(198, 138, 71, 0.08);
            border-color: rgba(198, 138, 71, 0.25);
            color: var(--scanory-primary);
        }

        .btn-shuffle svg {
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-shuffle:hover svg {
            transform: rotate(180deg);
        }

        .btn-shuffle:active {
            transform: scale(0.92);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body id="vaultBody">

    <canvas id="stardust"></canvas>

    <main>
        <div class="spacer-top"></div>

        <div class="vault-header">
            <h2>Scanory Baby</h2>
        </div>

        <div class="brand-center">
            <div class="eclipse-node">
                <div class="brand-glow"></div>
                <div class="eclipse-wave w1"></div>
                <div class="eclipse-wave w2"></div>
                <div class="eclipse-wave w3"></div>
                <div class="eclipse-core"></div>
            </div>
        </div>

        <div id="audioRack">
            <audio id="audio-lullaby" loop preload="auto" src="./lullaby.mp3"></audio>
            <audio id="audio-musicbox" loop preload="auto" src="./musicbox.mp3"></audio>
            <audio id="audio-whitenoise" loop preload="auto" src="./whitenoise.mp3"></audio>
            <audio id="audio-womb" loop preload="auto" src="./womb.mp3"></audio>
        </div>

        <div class="mixer-container">
            <div class="mixer-channel" id="chan-lullaby">
                <span class="channel-icon">🌙</span>
                <div class="channel-info">
                    <div class="channel-name">Lullaby</div>
                </div>
                <div class="slider-wrapper">
                    <div class="track-bg"></div>
                    <div class="progress-fill" id="fill-lullaby" style="width: 50%;"></div>
                    <input type="range" id="slider-lullaby" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>

            <div class="mixer-channel" id="chan-musicbox">
                <span class="channel-icon">🧸</span>
                <div class="channel-info">
                    <div class="channel-name">Music Box</div>
                </div>
                <div class="slider-wrapper">
                    <div class="track-bg"></div>
                    <div class="progress-fill" id="fill-musicbox" style="width: 0%;"></div>
                    <input type="range" id="slider-musicbox" min="0" max="1" step="0.01" value="0">
                </div>
            </div>

            <div class="mixer-channel" id="chan-whitenoise">
                <span class="channel-icon">🤫</span>
                <div class="channel-info">
                    <div class="channel-name">White Noise</div>
                </div>
                <div class="slider-wrapper">
                    <div class="track-bg"></div>
                    <div class="progress-fill" id="fill-whitenoise" style="width: 0%;"></div>
                    <input type="range" id="slider-whitenoise" min="0" max="1" step="0.01" value="0">
                </div>
            </div>

            <div class="mixer-channel" id="chan-womb">
                <span class="channel-icon">❤️</span>
                <div class="channel-info">
                    <div class="channel-name">Womb Sound</div>
                </div>
                <div class="slider-wrapper">
                    <div class="track-bg"></div>
                    <div class="progress-fill" id="fill-womb" style="width: 0%;"></div>
                    <input type="range" id="slider-womb" min="0" max="1" step="0.01" value="0">
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <button id="masterPlayBtn" class="btn-master-play">
                <span id="masterPlayText">Activate Vault</span>
            </button>
            
            <button id="shuffleBtn" class="btn-shuffle" title="Infinite Smart Shuffle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 3 21 3 21 8"></polyline>
                    <line x1="4" y1="20" x2="21" y2="3"></line>
                    <polyline points="21 16 21 21 16 21"></polyline>
                    <line x1="15" y1="15" x2="21" y2="21"></line>
                    <line x1="4" y1="4" x2="9" y2="9"></line>
                </svg>
            </button>
        </div>

        <div class="spacer-bottom"></div>
    </main>

    <script>
        // --- MIXER ARCHITECTURE ENGINE ---
        const channels = [
            { id: 'lullaby', audio: document.getElementById('audio-lullaby'), slider: document.getElementById('slider-lullaby'), fill: document.getElementById('fill-lullaby'), container: document.getElementById('chan-lullaby') },
            { id: 'musicbox', audio: document.getElementById('audio-musicbox'), slider: document.getElementById('slider-musicbox'), fill: document.getElementById('fill-musicbox'), container: document.getElementById('chan-musicbox') },
            { id: 'whitenoise', audio: document.getElementById('audio-whitenoise'), slider: document.getElementById('slider-whitenoise'), fill: document.getElementById('fill-whitenoise'), container: document.getElementById('chan-whitenoise') },
            { id: 'womb', audio: document.getElementById('audio-womb'), slider: document.getElementById('slider-womb'), fill: document.getElementById('fill-womb'), container: document.getElementById('chan-womb') }
        ];

        const masterPlayBtn = document.getElementById('masterPlayBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const masterPlayText = document.getElementById('masterPlayText');
        const vaultBody = document.getElementById('vaultBody');
        
        let isMasterPlaying = false;

        channels.forEach(chan => {
            chan.audio.volume = chan.slider.value;
            chan.fill.style.width = `${chan.slider.value * 100}%`;
            updateChannelState(chan);

            chan.audio.addEventListener('timeupdate', () => {
                if (chan.audio.currentTime > chan.audio.duration - 0.3) {
                    chan.audio.currentTime = 0;
                    if (isMasterPlaying && chan.audio.volume > 0) {
                        chan.audio.play().catch(() => {});
                    }
                }
            });

            chan.slider.addEventListener('input', (e) => {
                const val = e.target.value;
                chan.audio.volume = val;
                chan.fill.style.width = `${val * 100}%`;
                
                updateChannelState(chan);

                if (!isMasterPlaying && val > 0) {
                    toggleMasterPlayback();
                } else if (isMasterPlaying && val > 0) {
                    chan.audio.play().catch(() => {});
                }
            });
        });

        function updateChannelState(chan) {
            if (chan.audio.volume > 0) {
                chan.container.classList.add('active');
            } else {
                chan.container.classList.remove('active');
            }
        }

        function triggerInfiniteShuffle() {
            const focusIndex = Math.floor(Math.random() * channels.length);
            
            channels.forEach((chan, index) => {
                let targetVolume;
                
                if (index === focusIndex) {
                    targetVolume = (Math.random() * 0.30 + 0.60).toFixed(2);
                } else {
                    if (Math.random() < 0.25) {
                        targetVolume = 0;
                    } else {
                        targetVolume = (Math.random() * 0.40).toFixed(2);
                    }
                }
                
                chan.audio.volume = targetVolume;
                chan.slider.value = targetVolume;
                chan.fill.style.width = `${targetVolume * 100}%`;
                
                updateChannelState(chan);

                if (isMasterPlaying) {
                    if (targetVolume > 0) {
                        chan.audio.play().catch(() => {});
                    } else {
                        chan.audio.pause();
                    }
                }
            });

            if (!isMasterPlaying) {
                toggleMasterPlayback();
            }
        }

        function toggleMasterPlayback() {
            isMasterPlaying = !isMasterPlaying;

            if (isMasterPlaying) {
                masterPlayBtn.classList.add('active');
                vaultBody.classList.add('is-playing');
                masterPlayText.textContent = "Mute Vault";

                channels.forEach(chan => {
                    if (chan.audio.volume > 0) {
                        chan.audio.play().catch(err => {
                            console.log("SCANORY Engine active.");
                        });
                    }
                });
            } else {
                masterPlayBtn.classList.remove('active');
                vaultBody.classList.remove('is-playing');
                masterPlayText.textContent = "Activate Vault";

                channels.forEach(chan => {
                    chan.audio.pause();
                });
            }
        }

        masterPlayBtn.addEventListener('click', toggleMasterPlayback);
        shuffleBtn.addEventListener('click', triggerInfiniteShuffle);

        // --- BACKGROUND STARDUST ENGINE ---
        const canvas = document.getElementById('stardust');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2 + 0.4;
                this.speedY = Math.random() * -0.3 - 0.05;
                this.speedX = (Math.random() - 0.5) * 0.15;
                this.opacity = Math.random() * 0.4 + 0.1; 
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(198, 138, 71, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animateStardust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateStardust);
        }
        animateStardust();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCANORY | Premium Audio Vault</title>
    
    <style>
        /* =========================================
           SCANORY | BRAND COLOR LAWS & VARIABLES
           ========================================= */
        :root {
            --scanory-bg: #12100E;
            --scanory-section: #1E1A17;
            --scanory-primary: #C68A47;
            --scanory-secondary: #A0682B;
            --scanory-text-main: #F4F0EA;
            --scanory-text-sub: #D3CFC9;
            --glass-bg: rgba(30, 26, 23, 0.5);
            --glass-border: rgba(198, 138, 71, 0.15);
        }

        @font-face { font-family: 'Raleway'; src: local('Raleway'), sans-serif; }
        @font-face { font-family: 'Inter'; src: local('Inter'), sans-serif; }

        /* =========================================
           RESET & CORE FULLSCREEN ARCHITECTURE
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--scanory-bg);
            color: var(--scanory-text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            max-width: 100%;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            overscroll-behavior: none; 
        }

        canvas#stardust {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        main {
            z-index: 10;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .spacer-top { flex: 1.2; } 
        .spacer-bottom { flex: 0.8; min-height: 2rem; }

        /* =========================================
           HEADER
           ========================================= */
        .vault-header {
            flex: none;
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0.8;
            width: 100%;
        }

        .vault-header h2 {
            font-family: 'Raleway', sans-serif;
            color: var(--scanory-primary);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
        }

        /* =========================================
           EDGE-TO-EDGE CAROUSEL
           ========================================= */
        .carousel-viewport {
            flex: none;
            width: 100vw; 
            overflow: hidden;
            position: relative;
            margin-bottom: 1.5rem;
            touch-action: pan-y; 
        }

        .carousel-track {
            display: flex;
            align-items: center;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 clamp(240px, 60vw, 380px); 
            display: flex;
            justify-content: center;
            position: relative;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0.2;
            transform: scale(0.8);
            filter: blur(4px);
        }

        .carousel-slide.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
        }

        .cover-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            padding: 10px; 
        }

        /* AUDIO-REACTIVE RHYTHM RING */
        .rhythm-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--scanory-primary);
            opacity: var(--rhythm-opacity, 0);
            transform: scale(var(--rhythm-scale, 0.95));
            filter: blur(var(--rhythm-blur, 10px));
            z-index: -1;
            transition: transform 0.05s linear, opacity 0.05s linear, filter 0.05s linear;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 0.5rem;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            pointer-events: none; 
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            opacity: 0.9;
        }

        .is-playing .carousel-slide.active .cover-image {
            animation: spin-slow 25s linear infinite;
        }

        /* =========================================
           UI CONTROLS CONTAINER
           ========================================= */
        .ui-container {
            flex: none;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--scanory-text-sub);
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--scanory-primary);
            opacity: 1;
            transform: scale(1.4);
            box-shadow: 0 0 5px var(--scanory-primary);
        }

        .track-meta {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .track-title {
            font-family: 'Raleway', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
            text-align: center;
            font-weight: 600;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            color: var(--scanory-text-sub);
            font-size: 0.7rem;
            font-weight: 300;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.8;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .time-display {
            font-size: 0.65rem;
            color: var(--scanory-text-sub);
            font-family: monospace;
            opacity: 0.7;
            width: 2.5rem;
            flex: none;
        }

        .time-display.right { text-align: right; }
        .time-display.left { text-align: left; }

        .slider-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            height: 16px;
        }

        .track-bg {
            position: absolute;
            left: 0; right: 0; top: 50%;
            transform: translateY(-50%);
            height: 2px; background: rgba(211, 207, 201, 0.2);
            border-radius: 1px; z-index: 1;
        }

        .progress-fill {
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            height: 2px; background: var(--scanory-primary);
            border-radius: 1px; z-index: 2;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(198, 138, 71, 0.5);
        }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
            position: relative; z-index: 3; margin: 0; outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: var(--scanory-primary); cursor: pointer;
            box-shadow: 0 0 10px rgba(198, 138, 71, 0.8); margin-top: -6px;
        }

        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: transparent; border: none; }
        input[type=range]::-moz-range-thumb {
            height: 14px; width: 14px; border: none; border-radius: 50%;
            background: var(--scanory-primary); cursor: pointer;
            box-shadow: 0 0 10px rgba(198, 138, 71, 0.8);
        }
        input[type=range]::-moz-range-track { width: 100%; height: 2px; background: transparent; border: none; }

        /* Buttons */
        .controls-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        button {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; color: var(--scanory-text-sub);
            padding: 0.5rem;
        }

        button:focus { outline: none; }
        .btn-secondary { width: 2.5rem; height: 2.5rem; }
        .btn-secondary:hover { color: var(--scanory-text-main); }
        .btn-secondary.active { color: var(--scanory-primary); }

        .btn-play {
            width: 4.5rem; height: 4.5rem; border-radius: 50%;
            background: var(--scanory-section); color: var(--scanory-primary);
            border: 1px solid rgba(198, 138, 71, 0.3);
            box-shadow: 0 0 20px rgba(198, 138, 71, 0.1);
            position: relative; overflow: hidden; flex: none;
        }

        .btn-play::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(198,138,71,0.15) 0%, transparent 70%);
            opacity: 0; transition: opacity 0.3s ease;
        }

        .btn-play:hover {
            transform: scale(1.05); border-color: var(--scanory-primary);
            box-shadow: 0 0 30px rgba(198, 138, 71, 0.3);
        }

        @keyframes subtle-pulse {
            0% { box-shadow: 0 0 10px rgba(198, 138, 71, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(198, 138, 71, 0.6); transform: scale(1.05); }
            100% { box-shadow: 0 0 10px rgba(198, 138, 71, 0.2); transform: scale(1); }
        }

        .btn-play.needs-interaction {
            animation: subtle-pulse 2.5s infinite ease-in-out;
            border-color: var(--scanory-primary);
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body id="vaultBody">

    <canvas id="stardust"></canvas>

    <main>
        <div class="spacer-top"></div>

        <div class="vault-header">
            <h2>Scanory Vault</h2>
        </div>

        <div class="carousel-viewport">
            <div class="carousel-track" id="carouselTrack">
                </div>
        </div>

        <div class="ui-container">
            <div class="pagination" id="pagination"></div>

            <div class="track-meta">
                <h1 id="trackTitle" class="track-title">Loading...</h1>
                <p id="trackArtist" class="track-artist">SCANORY</p>
            </div>

            <audio id="audioPlayer" preload="auto"></audio>

            <div class="progress-container">
                <span id="currentTime" class="time-display right">0:00</span>
                <div class="slider-wrapper">
                    <div class="track-bg"></div>
                    <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
                    <input type="range" id="progressBar" min="0" max="100" value="0">
                </div>
                <span id="durationTime" class="time-display left">0:00</span>
            </div>

            <div class="controls-container">
                <button id="shuffleBtn" class="btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
                    </svg>
                </button>

                <button id="prevBtn" class="btn-secondary" style="color: var(--scanory-text-main);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;">
                        <polygon points="19 20 9 12 19 4 19 20"/>
                        <line x1="5" y1="19" x2="5" y2="5"/>
                    </svg>
                </button>

                <button id="playBtn" class="btn-play">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" style="width: 26px; height: 26px; margin-left: 4px;">
                        <polygon points="6 3 20 12 6 21 6 3"/>
                    </svg>
                    <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24" fill="currentColor" style="width: 26px; height: 26px;">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                </button>

                <button id="nextBtn" class="btn-secondary" style="color: var(--scanory-text-main);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;">
                        <polygon points="5 4 15 12 5 20 5 4"/>
                        <line x1="19" y1="5" x2="19" y2="19"/>
                    </svg>
                </button>

                <button id="repeatBtn" class="btn-secondary" style="position: relative;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
                        <path d="M17 2l4 4-4 4"/>
                        <path d="M3 11v-1a4 4 0 0 1 4-4h14"/>
                        <path d="M7 22l-4-4 4-4"/>
                        <path d="M21 13v1a4 4 0 0 1-4 4H3"/>
                    </svg>
                    <div id="repeatOneDot" class="hidden" style="position: absolute; top: 4px; right: 2px; width: 6px; height: 6px; background: var(--scanory-primary); border-radius: 50%;"></div>
                </button>
            </div>
        </div>

        <div class="spacer-bottom"></div>
    </main>

    <script>
        // --- DATA ARCHITECTURE ---
        const playlist = [
            { id: 0, title: "Sleeping Star", artist: "Your Personal Lullaby", src: "MoonCradle.mp3", cover: "BabyImage.jpeg" },
            { id: 1, title: "Cotton Dreams", artist: "Ambient Nightscape", src: "MoonCradle.mp3", cover: "BabyImage.jpeg" },
            { id: 2, title: "Moon Valley", artist: "Classical Piano", src: "MoonCradle.mp3", cover: "BabyImage.jpeg" }
        ];

        // --- DOM ELEMENTS ---
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const repeatOneDot = document.getElementById('repeatOneDot');
        
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const carouselTrack = document.getElementById('carouselTrack');
        const pagination = document.getElementById('pagination');
        const vaultBody = document.getElementById('vaultBody');

        // --- STATE ---
        let currentTrackIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; 
        
        let audioCtx, analyser, source, dataArray;
        let isAudioInitialized = false;

        // --- WEB AUDIO API (Rhythm Analyzer) ---
        function initAudioVisualizer() {
            if (isAudioInitialized) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                isAudioInitialized = true;
                drawRhythm();
            } catch (error) {
                console.warn("SCANORY Vault: Web Audio API restricted.");
            }
        }

        function drawRhythm() {
            if (!isAudioInitialized) return;
            requestAnimationFrame(drawRhythm);
            if (!isPlaying) return;

            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < 15; i++) sum += dataArray[i];
            let avg = sum / 15;
            
            let scale = 0.95 + (avg / 255) * 0.25;
            let opacity = (avg / 255) * 0.8;
            let blur = 10 + (avg / 255) * 20;

            const activeRing = document.querySelector('.carousel-slide.active .rhythm-ring');
            if (activeRing) {
                activeRing.style.setProperty('--rhythm-scale', scale);
                activeRing.style.setProperty('--rhythm-opacity', opacity);
                activeRing.style.setProperty('--rhythm-blur', blur + 'px');
            }
        }

        // --- CAROUSEL MATHEMATICS ---
        function initCarousel() {
            carouselTrack.innerHTML = '';
            pagination.innerHTML = '';
            
            playlist.forEach((track, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.id = `slide-${index}`;
                
                slide.innerHTML = `
                    <div class="cover-container">
                        <div class="rhythm-ring"></div>
                        <div class="glass-panel">
                            <img src="${track.cover}" alt="Cover" class="cover-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMxRTFBMTciLz48L3N2Zz4='">
                        </div>
                    </div>
                `;
                carouselTrack.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${index}`;
                pagination.appendChild(dot);
            });
        }

        function updateCarouselView() {
            const slide = document.getElementById(`slide-${currentTrackIndex}`);
            if (!slide) return;
            
            const slideWidth = slide.offsetWidth;
            const viewportWidth = window.innerWidth;
            const centerOffset = (viewportWidth / 2) - (slideWidth / 2);
            const translatePx = -(currentTrackIndex * slideWidth) + centerOffset;
            
            carouselTrack.style.transform = `translateX(${translatePx}px)`;

            document.querySelectorAll('.carousel-slide').forEach((s, idx) => {
                s.classList.toggle('active', idx === currentTrackIndex);
                if(idx !== currentTrackIndex) {
                    const ring = s.querySelector('.rhythm-ring');
                    if(ring) {
                        ring.style.setProperty('--rhythm-scale', 0.95);
                        ring.style.setProperty('--rhythm-opacity', 0);
                    }
                }
            });
            document.querySelectorAll('.dot').forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentTrackIndex);
            });
        }

        // --- PLAYER MECHANICS ---
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function loadTrack(index) {
            const track = playlist[index];
            audio.src = track.src;
            trackTitle.textContent = track.title;
            trackArtist.textContent = track.artist;
            
            // Set volume explicitly to 100% just in case
            audio.volume = 1.0; 
            
            updateCarouselView();
        }

        function togglePlayPause() {
            playBtn.classList.remove('needs-interaction');
            
            if (!isAudioInitialized) initAudioVisualizer();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            isPlaying ? audio.pause() : audio.play();
        }

        function updatePlayState(playing) {
            isPlaying = playing;
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                vaultBody.classList.add('is-playing');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                vaultBody.classList.remove('is-playing');
            }
        }

        function playNext() {
            if (!isAudioInitialized) initAudioVisualizer();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            if (isShuffle) {
                let nextIndex = currentTrackIndex;
                while (nextIndex === currentTrackIndex && playlist.length > 1) {
                    nextIndex = Math.floor(Math.random() * playlist.length);
                }
                currentTrackIndex = nextIndex;
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            }
            loadTrack(currentTrackIndex);
            playBtn.classList.remove('needs-interaction');
            audio.play();
        }

        function playPrev() {
            if (!isAudioInitialized) initAudioVisualizer();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            playBtn.classList.remove('needs-interaction');
            audio.play();
        }

        function toggleShuffle() {
            isShuffle = !isShuffle;
            isShuffle ? shuffleBtn.classList.add('active') : shuffleBtn.classList.remove('active');
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            if (repeatMode === 0) {
                repeatBtn.classList.remove('active');
                repeatOneDot.classList.add('hidden');
            } else if (repeatMode === 1) {
                repeatBtn.classList.add('active');
                repeatOneDot.classList.add('hidden');
            } else {
                repeatBtn.classList.add('active');
                repeatOneDot.classList.remove('hidden');
            }
        }

        // --- NATIVE SWIPE LOGIC ---
        let isDragging = false;
        let startPos = 0;

        carouselTrack.addEventListener('touchstart', (e) => {
            isDragging = true;
            startPos = e.touches[0].clientX;
            carouselTrack.style.transition = 'none'; 
        });

        carouselTrack.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const diff = e.touches[0].clientX - startPos;
            const slide = document.getElementById(`slide-${currentTrackIndex}`);
            if(!slide) return;
            
            const slideWidth = slide.offsetWidth;
            const centerOffset = (window.innerWidth / 2) - (slideWidth / 2);
            const baseTranslatePx = -(currentTrackIndex * slideWidth) + centerOffset;
            
            carouselTrack.style.transform = `translateX(${baseTranslatePx + diff}px)`;
        });

        carouselTrack.addEventListener('touchend', (e) => {
            isDragging = false;
            carouselTrack.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            const diff = e.changedTouches[0].clientX - startPos;
            const threshold = 50; 

            if (diff < -threshold && currentTrackIndex < playlist.length - 1) {
                playNext(); 
            } else if (diff > threshold && currentTrackIndex > 0) {
                playPrev(); 
            } else {
                updateCarouselView(); 
            }
        });

        window.addEventListener('resize', updateCarouselView);

        // --- EVENT LISTENERS & FAILSAFES ---
        playBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);
        shuffleBtn.addEventListener('click', toggleShuffle);
        repeatBtn.addEventListener('click', toggleRepeat);

        audio.addEventListener('play', () => updatePlayState(true));
        audio.addEventListener('pause', () => updatePlayState(false));
        
        // AUDIO ERROR DETECTOR
        audio.addEventListener('error', (e) => {
            console.error("SCANORY Vault: Audio file missing or blocked.");
            trackTitle.textContent = "⚠️ AUDIO MISSING";
            trackArtist.textContent = "CHECK FOLDER ARCHITECTURE";
            updatePlayState(false);
        });

        audio.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audio.currentTime = 0;
                audio.play();
            } else if (repeatMode === 1 || currentTrackIndex < playlist.length - 1) {
                playNext();
            } else {
                updatePlayState(false);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progressPercent;
                progressFill.style.width = `${progressPercent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        progressBar.addEventListener('input', (e) => {
            const seekTime = (e.target.value / 100) * audio.duration;
            audio.currentTime = seekTime;
            progressFill.style.width = `${e.target.value}%`;
        });

        // --- BACKGROUND STARDUST ---
        const canvas = document.getElementById('stardust');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * -0.4 - 0.1;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.opacity = Math.random() * 0.5 + 0.1; 
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(198, 138, 71, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animateStardust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateStardust);
        }
        animateStardust();

        // --- INITIALIZATION ---
        initCarousel();
        loadTrack(currentTrackIndex);

        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                updatePlayState(true);
            }).catch(error => {
                console.log("SCANORY Vault: Awaiting user interaction to unlock audio.");
                playBtn.classList.add('needs-interaction');
            });
        }
    </script>
</body>
</html>
